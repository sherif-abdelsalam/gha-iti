# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04-Deploy Workflow

on:
  pull_request:
    types: [closed]

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read

jobs:
  build-and-scan-artifacts-temp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v4

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        # This keeps the tag easy to explain and still unique for the run.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with docker build
        # Create the packaged application image with one traceable tag.
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Save Docker image as artifact file
        # Convert that exact tagged image into a file that can be reused later.
        run: docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

      - name: Save image metadata
        # Keep the exact built image reference alongside the tar file.
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Scan image tar artifact
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: "${{ env.IMAGE_TAR }}"
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7

  deploy-package:
    needs: build-and-scan-artifacts-temp
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        # Download the exact artifact produced by the build job above.
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          path: downloaded-artifact

      - name: Show downloaded files
        # Quick visibility step so students can see what arrived from the build.
        run: ls -R downloaded-artifact

      - name: Load Docker image
        # Turn the saved artifact file back into a Docker image.
        run: docker load --input "downloaded-artifact/${IMAGE_TAR}"

      - name: Read image metadata from build artifact
        # Read the exact built image reference that the build job saved.
        id: image-metadata
        run: |
          source "downloaded-artifact/${IMAGE_METADATA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_reference=${IMAGE_REFERENCE}" >> "$GITHUB_OUTPUT"

      - name: Show exact image reference
        # Visibility step so students can see what exact package is being delivered.
        run: echo "Deploying ${{ steps.image-metadata.outputs.image_reference }}"

      - name: Start container
        # Start the exact same tagged image that the build job created.
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${{ steps.image-metadata.outputs.image_reference }}"

      - name: Show running containers
        run: docker ps

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Print /health response
        run: curl --silent "http://127.0.0.1:${APP_PORT}/health"

      - name: Stop container
        if: always()
        # Clean up even if an earlier step fails.
        run: docker rm -f "${CONTAINER_NAME}" || true