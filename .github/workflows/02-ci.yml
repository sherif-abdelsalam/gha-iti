# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:
  schedule:
    - cron: '15 9 * * *'

env:
  PYTHON_VERSION: ${{secrets.PYTHON_VERSION}}

jobs:
  run-tests:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:

        os: [ubuntu-latest]
        python-version: ["3.12"]
    
    # The runner is the temporary machine that executes the steps below.
    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Scan Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
      

      - name: Scan Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
      
      - name: Validate repo
        run: ls -la

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Validate Python version
        run: python --version

      - name: Install Ruff
        run: pip install ruff

      - name: Run Lint
        run: ruff check .

      - name: Current runner time
        run: date

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        # This keeps the tag easy to explain and still unique for the run.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with docker build
        # Create the packaged application image with one traceable tag.
        # The deploy workflow will run this exact same tag later.
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Save Docker image as artifact file
        # Convert that exact tagged image into a file that can be reused later.
        run: docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

      - name: Save image metadata
        # Keep the exact built image reference alongside the tar file.
        # The deploy workflow reads this file later instead of recreating the tag.
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Scan image tar artifact
        uses: aquasecurity/trivy-action@0.33.1
        with:
          input: "${{ env.IMAGE_TAR }}"
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: Upload build artifact
        # Store the packaged output so a later workflow can use the exact same package.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7

